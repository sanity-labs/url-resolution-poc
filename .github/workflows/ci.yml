name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @sanity/routes build
      - run: pnpm --filter @sanity/routes test

  docs:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @sanity/routes build
      - run: pnpm --filter @sanity/routes docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/routes/docs/api
      - uses: actions/deploy-pages@v4
        id: deployment

  deploy-functions:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @sanity/routes build
      - name: Configure blueprints scope
        working-directory: studio
        run: pnpx sanity@3.99.0 blueprints config --edit --project-id ${{ vars.SANITY_PROJECT_ID }} --stack-id ${{ vars.SANITY_STACK_ID }}
      - run: pnpx sanity@3.99.0 blueprints deploy
        working-directory: studio
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
          SANITY_ASSET_TIMEOUT: 180
